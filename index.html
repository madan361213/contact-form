<body>

<header>

    <h2>ApexPlanet</h2>

    <nav>

        <a href="#home">Home</a>
        <a href="#gallery">Gallery</a>
        <a href="#todo">To-Do</a>
        <a href="#contact">Contact</a>

    </nav>

</header>

<section class="hero" id="home">

    <!-- <h1>Intermediate HTML, CSS & JavaScript</h1> -->
     <h1>Welcom to my project</h1>

    <!-- <p>
        Task-2 Internship Project
    </p> -->

</section>

<section class="container">

<div class="card" id="contact">

<h2>Contact Form</h2>

<form id="contactForm">

<input
type="text"
id="name"
placeholder="Enter Your Name">

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="text"
id="subject"
placeholder="Subject">

<textarea
id="message"
placeholder="Write Message"></textarea>

<button type="submit">

Send Message

</button>

<p id="formMessage"></p>

</form>

</div>

<div class="card" id="gallery">

<h2>Image Gallery</h2>

<div class="gallery" id="galleryBox">

<image src="images/image1.jpg">
<image src="images/image2.jpg">
<image src="images/image3.jpg">
<image src="images/image4.jpg">
<image src="images/image5.jpg">
<image src="images/image6.jpg">

</div>

<div class="gallery-buttons">

<button id="addImage">

Add Image

</button>

<button id="removeImage">

Remove Image

</button>

</div>

</div>

<div class="card" id="todo">

<h2>To-Do List</h2>

<div class="todo-input">

<input
type="text"
id="taskInput"
placeholder="Enter Task">

<button onclick="addTask()">

Add Task


</button>

</div>

<ul id="taskList"></ul>

</div>

</section>
